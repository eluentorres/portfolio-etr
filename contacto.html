<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Formulario de contacto de Eluen Ariel Torres Rivera."
  >
  <title>Contacto | Eluen Ariel Torres Rivera</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <div id="header-root"></div>

  <main>

    <section class="contact-section">

      <h1>Contacto</h1>

      <form action="https://formspree.io/f/xlgkkazv" method="POST" class="contact-form">
  
  <div class="form-group">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="name" required placeholder="Tu nombre completo">
  </div>

  <div class="form-group">
    <label for="email">Correo Electrónico:</label>
    <input type="email" id="email" name="email" required placeholder="tu@email.com">
  </div>

  <div class="form-group">
    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" name="message" rows="5" required placeholder="Escribe tu mensaje aquí..."></textarea>
  </div>

  <button type="submit" class="btn">Enviar Mensaje</button>
</form>

    </section>


  </main>

  <div id="footer-root"></div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
