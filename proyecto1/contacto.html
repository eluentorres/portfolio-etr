<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Formulario de contacto de Eluen Ariel Torres Rivera."
  >
  <title>Contacto | Eluen Ariel Torres Rivera</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <div id="header-root"></div>

  <main>

    <section class="contact-section">

      <h1>Contacto</h1>

      <form action="#" method="post">

        <div>
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            required
          >
        </div>

        <div>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
          >
        </div>

        <div>
          <label for="asunto">Asunto</label>
          <input
            type="text"
            id="asunto"
            name="asunto"
            required
          >
        </div>

        <div>
          <label for="mensaje">Mensaje</label>
          <textarea
            id="mensaje"
            name="mensaje"
            rows="8"
            required
          ></textarea>
        </div>

        <button type="submit">
          Enviar mensaje
        </button>

      </form>

    </section>


  </main>

  <div id="footer-root"></div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
