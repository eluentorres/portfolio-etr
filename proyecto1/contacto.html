  <meta charset="UTF-8">

    content="Formulario de contacto de Eluen Ariel Torres Rivera."
  >

  <title>Contacto | Eluen Ariel Torres Rivera</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>


<body>

  <header>

    <nav>

      <a href="index.html">
        <img
        class="logo"
        src="https://res.cloudinary.com/djdz1fcec/image/upload/v1781330750/logo_iooete.png"
        alt="Logo ETR"
        width="80"
        >
      </a>

      <ul>
        <li><a href="#">About</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Cheatsheets</a></li>

      </ul>
 
      <button class="hamburger">
        ☰
      </button>
    </nav>

  </header>

  <main>

    <section class="contact-section">

      <h1>Contacto</h1>

      <form action="#" method="post">

        <div>
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            required
          >
        </div>

        <div>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
          >
        </div>

        <div>
          <label for="asunto">Asunto</label>
          <input
            type="text"
            id="asunto"
            name="asunto"
            required
          >
        </div>

        <div>
          <label for="mensaje">Mensaje</label>

          <textarea
            id="mensaje"
            name="mensaje"
            rows="8"
            required
          ></textarea>
        </div>

        <button type="submit">
          Enviar mensaje
        </button>

      </form>

    </section>

  </main>

  <footer>

    <p>

</body>
